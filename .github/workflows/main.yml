name: Deysafe AI Build Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build_android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install flet

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK r25c
        run: |
          sdkmanager --install "ndk;25.2.9519653" # This is r25c
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/25.2.9519653" >> $GITHUB_ENV

      - name: Model Fetching (Hugging Face)
        run: |
          mkdir -p assets/models
          # Fetching specific 1-bit GGUF
          curl -L "https://huggingface.co/rufatronics/nigerian_nlu/resolve/main/bonsai_1.7b_1bit.gguf" -o assets/models/bonsai_1.7b_1bit.gguf
          curl -L "https://huggingface.co/rufatronics/crop_doctor/resolve/main/crop_doctor.tflite" -o assets/models/crop_doctor.tflite
          curl -L "https://huggingface.co/rufatronics/health_scan/resolve/main/health_scan.tflite" -o assets/models/health_scan.tflite

      - name: Build Native 1-bit Kernels (Prism-ML Optimized)
        run: |
          # Use specific PrismML-Eng/llama.cpp fork for 1-bit b1.58 quantization support
          # This fork contains the high-performance ternary kernels specifically for Bonsai
          git clone --depth 1 https://github.com/PrismML-Eng/llama.cpp.git
          cd llama.cpp
          
          # Build specialized native libraries for ARMv7 and ARM64
          # We use -DGGML_BITNET=ON to enable the 1-bit inference engine
          
          # Build for arm64-v8a
          mkdir build-arm64 && cd build-arm64
          cmake -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
                -DANDROID_ABI=arm64-v8a -DANDROID_PLATFORM=android-23 \
                -DGGML_BITNET=ON -DGGML_ARM_FMA=ON -DGGML_NEON=ON ..
          make -j$(nproc)
          cp bin/libllama.so ../../jniLibs/arm64-v8a/
          cd ..
          
          # Build for armeabi-v7a (Critical for 2GB legacy devices)
          mkdir build-v7a && cd build-v7a
          cmake -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
                -DANDROID_ABI=armeabi-v7a -DANDROID_PLATFORM=android-21 \
                -DGGML_BITNET=ON -DGGML_ARM_FMA=ON -DGGML_NEON=ON ..
          make -j$(nproc)
          cp bin/libllama.so ../../jniLibs/armeabi-v7a/
          cd ../..

      - name: Northwatch Intelligence Scrape (Offline WebView)
        run: |
          mkdir -p assets/www
          # Recursive wget to mirror the intelligence map for offline use
          wget --mirror --convert-links --adjust-extension --page-requisites --no-parent https://nw0.vercel.app -P assets/www/
          # Move files to the root of www for the WebView to find index.html correctly
          mv assets/www/nw0.vercel.app/* assets/www/ || true

      - name: Native Bundling (NDK libs)
        run: |
          mkdir -p jniLibs/armeabi-v7a jniLibs/arm64-v8a
          # Use ANDROID_NDK_HOME which we set during r25c installation
          # Paths for NDK r25c
          find $ANDROID_NDK_HOME -name "libc++_shared.so" | grep "arm-linux-androideabi" | xargs -I {} cp {} jniLibs/armeabi-v7a/
          find $ANDROID_NDK_HOME -name "libc++_shared.so" | grep "aarch64-linux-android" | xargs -I {} cp {} jniLibs/arm64-v8a/
          
          # Verify files exist
          ls -l jniLibs/armeabi-v7a/libc++_shared.so
          ls -l jniLibs/arm64-v8a/libc++_shared.so

      - name: Build Universal APK
        run: |
          # Flet build command for Android
          # This compiles the Python code and bundles assets/ and jniLibs/
          flet build apk --include jniLibs --include assets --release
          
          # Move APK to expected location for next stage
          mkdir -p build
          cp dist/*.apk build/app-universal-release.apk

      - name: Push to Appetize.io
        run: |
          curl https://APIDtoken:${{ secrets.APPETIZE_TOKEN }}@api.appetize.io/v1/apps \
            -F "file=@build/app-universal-release.apk" \
            -F "platform=android"
